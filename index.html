<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 80px;
      margin: 0;
      color: #38bdf8;
    }

    h2 {
      margin: 10px 0;
      font-weight: normal;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 10px 20px;
      background: #38bdf8;
      color: #000;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s;
    }

    a:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for doesn't exist or has been removed.</p>
  </div>
</body>
</html>
